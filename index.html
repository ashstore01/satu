<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Administrasi Sekolah - Admin Pro</title>
  
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 16px 24px;
      border-radius: 12px; color: white; z-index: 9999;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
      animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    .toast.success { background: #059669; }
    .toast.error { background: #dc2626; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid #e2e8f0; }
  </style>
 </head>
 
 <body class="h-full w-full bg-[#f1f5f9]">
  <div id="app" class="h-full w-full"></div>
  
  <script>
    // --- GLOBAL STATE ---
    let allData = [];
    let currentUser = null;
    let currentView = 'login'; 
    let currentDashboardPage = 'home';
    let sidebarOpen = true;

    // --- UTILITIES ---
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = '0.5s';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    // --- REGESTRASI & LOGIN LOGIC (FIXED) ---
    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      const email = form.email.value.trim();
      const username = form.username.value.trim().toLowerCase();
      const password = form.password.value;
      const role = form.role.value;

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Menyimpan...';

        // Ambil data terbaru langsung dari database untuk validasi duplikat
        const latestData = await window.dataSdk.read() || [];
        const isDuplicate = latestData.some(d => d.type === 'user' && d.username === username);

        if (isDuplicate) {
          showToast('Username sudah terdaftar!', 'error');
          return;
        }

        const newUser = {
          id: "user_" + Date.now(),
          type: 'user',
          email,
          username,
          password,
          role,
          created_at: new Date().toISOString()
        };

        const result = await window.dataSdk.create(newUser);

        if (result.isOk) {
          showToast('Registrasi Berhasil! Silakan Login');
          setTimeout(() => { currentView = 'login'; renderApp(); }, 1000);
        } else {
          showToast('Gagal mendaftar ke sistem', 'error');
        }
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Daftar Sekarang';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = e.target.username.value.trim().toLowerCase();
      const password = e.target.password.value;

      const latestData = await window.dataSdk.read() || [];
      const user = latestData.find(d => d.type === 'user' && d.username === username && d.password === password);

      if (user) {
        currentUser = user;
        currentView = 'dashboard';
        showToast('Login berhasil sebagai ' + user.role);
        renderApp();
      } else {
        showToast('Username atau Password salah', 'error');
      }
    }

    // --- KHUSUS ADMIN: HAPUS AKUN ---
    async function deleteAccount(userId) {
      if (!confirm('Apakah Anda yakin ingin menghapus akun ini?')) return;
      
      const accountToDelete = allData.find(d => d.id === userId);
      if (accountToDelete.id === currentUser.id) {
        showToast('Anda tidak bisa menghapus akun Anda sendiri!', 'error');
        return;
      }

      const result = await window.dataSdk.delete(accountToDelete);
      if (result.isOk) {
        showToast('Akun berhasil dihapus');
        // UI akan otomatis update viaChangeListener
      } else {
        showToast('Gagal menghapus akun', 'error');
      }
    }

    // --- RENDER VIEWS ---
    function renderApp() {
      const container = document.getElementById('app');
      container.innerHTML = '';

      if (currentView === 'login') renderLogin(container);
      else if (currentView === 'register') renderRegister(container);
      else if (currentView === 'dashboard') renderDashboard(container);
    }

    function renderLogin(c) {
      c.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
          <div class="glass-card p-10 rounded-3xl shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-black text-slate-800 mb-2 text-center">MASUK</h2>
            <p class="text-center text-slate-500 mb-8 text-sm">Sistem Administrasi Sekolah</p>
            <form onsubmit="handleLogin(event)" class="space-y-4">
              <input name="username" type="text" placeholder="Username" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
              <input name="password" type="password" placeholder="Password" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
              <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Login</button>
            </form>
            <button onclick="currentView='register';renderApp()" class="w-full mt-6 text-sm text-slate-600 font-semibold italic">Belum punya akun? Klik untuk mendaftar</button>
          </div>
        </div>`;
    }

    function renderRegister(c) {
      c.innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
          <div class="glass-card p-10 rounded-3xl shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-black text-slate-800 mb-6 text-center">REGISTRASI</h2>
            <form onsubmit="handleRegister(event)" class="space-y-4">
              <input name="email" type="email" placeholder="Email" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
              <input name="username" type="text" placeholder="Username Baru" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
              <input name="password" type="password" placeholder="Password" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
              <select name="role" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <option value="admin">Admin</option>
                <option value="guru">Guru</option>
                <option value="staff">Staff</option>
              </select>
              <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg hover:bg-emerald-700 transition-all">Daftar Sekarang</button>
            </form>
            <button onclick="currentView='login';renderApp()" class="w-full mt-6 text-sm text-slate-500 font-medium">Batal & Kembali ke Login</button>
          </div>
        </div>`;
    }

    function renderDashboard(c) {
      c.innerHTML = `
        <div class="flex h-screen">
          <aside class="${sidebarOpen ? 'w-64' : 'w-0'} bg-slate-900 text-white transition-all duration-300 overflow-hidden flex flex-col">
            <div class="p-6 font-black text-xl border-b border-slate-800">SAS-SCHOOL</div>
            <nav class="flex-1 p-4 space-y-2">
              <button onclick="currentDashboardPage='home';renderApp()" class="w-full text-left p-3 rounded-xl ${currentDashboardPage==='home'?'bg-indigo-600':''}">📊 Dashboard</button>
              <button onclick="currentDashboardPage='accounts';renderApp()" class="w-full text-left p-3 rounded-xl ${currentDashboardPage==='accounts'?'bg-indigo-600':''}">👥 Manajemen Akun</button>
            </nav>
            <div class="p-4"><button onclick="currentUser=null;currentView='login';renderApp()" class="w-full p-3 bg-red-500/10 text-red-400 rounded-xl font-bold">Keluar</button></div>
          </aside>
          
          <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b flex items-center justify-between px-6">
              <button onclick="sidebarOpen=!sidebarOpen;renderApp()" class="text-xl">☰</button>
              <div class="font-bold text-slate-700 capitalize">${currentUser.role}: ${currentUser.username}</div>
            </header>
            <div class="p-8 overflow-auto flex-1">
              ${renderDashboardContent()}
            </div>
          </main>
        </div>`;
    }

    function renderDashboardContent() {
      if (currentDashboardPage === 'home') {
        return `
          <h2 class="text-2xl font-bold mb-6 text-slate-800">Ringkasan Sistem</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
              <p class="text-slate-400 text-sm font-bold uppercase">Total Akun</p>
              <p class="text-4xl font-black">${allData.filter(d => d.type === 'user').length}</p>
            </div>
          </div>`;
      }

      if (currentDashboardPage === 'accounts') {
        const users = allData.filter(d => d.type === 'user');
        return `
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">Manajemen Pengguna</h2>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b">
                <tr>
                  <th class="p-4 font-bold text-slate-600">Username</th>
                  <th class="p-4 font-bold text-slate-600">Email</th>
                  <th class="p-4 font-bold text-slate-600">Role</th>
                  <th class="p-4 font-bold text-slate-600 text-right">Aksi</th>
                </tr>
              </thead>
              <tbody>
                ${users.map(u => `
                  <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-medium text-slate-800">${u.username}</td>
                    <td class="p-4 text-slate-500">${u.email}</td>
                    <td class="p-4"><span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold uppercase">${u.role}</span></td>
                    <td class="p-4 text-right">
                      ${currentUser.role === 'admin' ? 
                        `<button onclick="deleteAccount('${u.id}')" class="text-red-500 font-bold text-sm hover:underline">Hapus</button>` : 
                        `<span class="text-slate-300 text-xs italic">Akses Terbatas</span>`
                      }
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      }
    }

    // --- INITIALIZATION ---
    async function init() {
      if (window.dataSdk) {
        // Otomatis sinkronisasi data ke variabel lokal setiap ada perubahan di sistem
        window.dataSdk.onChangeListener((data) => {
          allData = data;
          if (currentView === 'dashboard') renderApp();
        });

        // Muat data awal secara otomatis
        const initialData = await window.dataSdk.read();
        if (initialData) allData = initialData;
      }
      renderApp();
    }

    init();
  </script>
 </body>
</html>
