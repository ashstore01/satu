<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Administrasi Sekolah Pro (Persistence)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 font-sans" x-data="schoolApp()" x-init="loadFromStorage()">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
                <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Login Admin</h2>
                <p class="text-xs text-center mb-4 text-gray-400 italic">User & Pass: admin</p>
                <input type="text" placeholder="Username" class="w-full p-2 mb-4 border rounded" x-model="loginUser">
                <input type="password" placeholder="Password" class="w-full p-2 mb-6 border rounded" x-model="loginPass">
                <button @click="login()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Masuk</button>
            </div>
        </div>
    </template>

    <div class="flex min-h-screen" x-show="isLoggedIn">
        <aside class="w-64 bg-slate-800 text-white flex-shrink-0">
            <div class="p-6 text-xl font-bold border-b border-slate-700 uppercase tracking-wider text-blue-400">Admin Panel</div>
            <nav class="mt-6">
                <a @click="menu = 'dashboard'" class="block py-3 px-6 hover:bg-slate-700 cursor-pointer" :class="menu === 'dashboard' ? 'bg-blue-600' : ''">Dashboard</a>
                <a @click="menu = 'sekolah'" class="block py-3 px-6 hover:bg-slate-700 cursor-pointer" :class="menu === 'sekolah' ? 'bg-blue-600' : ''">Data Sekolah</a>
                <a @click="menu = 'guru'" class="block py-3 px-6 hover:bg-slate-700 cursor-pointer" :class="menu === 'guru' ? 'bg-blue-600' : ''">Data Guru</a>
                <a @click="menu = 'siswa'" class="block py-3 px-6 hover:bg-slate-700 cursor-pointer" :class="menu === 'siswa' ? 'bg-blue-600' : ''">Data Siswa</a>
                <a @click="menu = 'gaji'" class="block py-3 px-6 hover:bg-slate-700 cursor-pointer" :class="menu === 'gaji' ? 'bg-blue-600' : ''">Gaji Guru</a>
                
                <div class="border-t border-slate-700 mt-10 pt-4 space-y-1">
                    <button @click="backupData()" class="w-full text-left py-2 px-6 text-sm text-green-400 hover:bg-slate-700 italic">💾 Backup ke File</button>
                    <label class="w-full text-left py-2 px-6 text-sm text-yellow-400 hover:bg-slate-700 italic cursor-pointer block">
                        📂 Restore dari File
                        <input type="file" class="hidden" @change="restoreData($event)">
                    </label>
                    <button @click="logout()" class="w-full text-left py-3 px-6 text-red-400 hover:bg-slate-700 font-bold">Logout</button>
                </div>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-lg shadow-sm">
                <h1 class="text-2xl font-bold text-slate-700 capitalize" x-text="menu.replace('-', ' ')"></h1>
                <button @click="printPDF()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm font-semibold transition">
                    Cetak Laporan PDF
                </button>
            </header>

            <template x-if="menu === 'siswa'">
                <div class="bg-white p-6 rounded-lg shadow">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold">Manajemen Siswa</h3>
                        <div class="flex gap-2">
                            <input type="text" placeholder="Nama Siswa" x-model="newSiswa.nama" class="border p-2 rounded text-sm">
                            <select x-model="newSiswa.kelas" class="border p-2 rounded text-sm">
                                <template x-for="kls in daftarKelas">
                                    <option :value="kls" x-text="kls"></option>
                                </template>
                            </select>
                            <button @click="addSiswa()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">+ Tambah</button>
                        </div>
                    </div>
                    
                    <div class="mb-6 p-4 bg-gray-50 rounded border border-dashed border-gray-300">
                        <p class="text-sm font-semibold mb-2">Tambah Kelas Baru:</p>
                        <div class="flex gap-2">
                            <input type="text" x-model="newKelasName" placeholder="Contoh: XII-IPA 3" class="border p-2 rounded text-sm">
                            <button @click="addKelas()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">Simpan Kelas</button>
                        </div>
                    </div>

                    <table class="w-full border-collapse">
                        <thead class="bg-slate-100">
                            <tr>
                                <th class="p-3 border text-left">Nama</th>
                                <th class="p-3 border text-left">Kelas</th>
                                <th class="p-3 border text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(s, index) in db.siswa" :key="index">
                                <tr class="hover:bg-gray-50">
                                    <td class="p-3 border" x-text="s.nama"></td>
                                    <td class="p-3 border" x-text="s.kelas"></td>
                                    <td class="p-3 border text-center">
                                        <button @click="db.siswa.splice(index, 1); saveToStorage()" class="text-red-500 hover:underline">Hapus</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <template x-if="menu === 'gaji'">
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-600">
                        <h3 class="text-lg font-bold mb-4">Input Gaji Harian</h3>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase">Tipe</label>
                                <select class="w-full border p-2 rounded mt-1" x-model="gajiCalc.tipe">
                                    <option value="full">Full Day (100%)</option>
                                    <option value="pengganti">Pengganti (80%)</option>
                                    <option value="selingan">Selingan (50%)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-500 uppercase">Potongan (Rp)</label>
                                <input type="number" class="w-full border p-2 rounded mt-1" x-model.number="gajiCalc.potongan">
                            </div>
                            <div class="md:col-span-2 flex items-end">
                                <div class="bg-blue-50 p-2 rounded w-full flex justify-between items-center border border-blue-100">
                                    <span class="text-sm">Total Gaji Hari Ini:</span>
                                    <span class="text-xl font-bold text-blue-700" x-text="formatRupiah(hitungGaji())"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white p-6 rounded shadow text-center">
                            <h4 class="text-gray-400 text-xs font-bold uppercase tracking-widest">Estimasi 1 Bulan</h4>
                            <p class="text-2xl font-black text-slate-800 mt-2" x-text="formatRupiah(hitungGaji() * 26)"></p>
                        </div>
                        <div class="bg-white p-6 rounded shadow text-center">
                            <h4 class="text-gray-400 text-xs font-bold uppercase tracking-widest">Estimasi 3 Bulan</h4>
                            <p class="text-2xl font-black text-slate-800 mt-2" x-text="formatRupiah(hitungGaji() * 26 * 3)"></p>
                        </div>
                        <div class="bg-white p-6 rounded shadow text-center">
                            <h4 class="text-gray-400 text-xs font-bold uppercase tracking-widest">Estimasi 6 Bulan</h4>
                            <p class="text-2xl font-black text-slate-800 mt-2" x-text="formatRupiah(hitungGaji() * 26 * 6)"></p>
                        </div>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <script>
        function schoolApp() {
            return {
                isLoggedIn: false,
                loginUser: '',
                loginPass: '',
                menu: 'dashboard',
                
                // DATA STATE
                daftarKelas: ['X-IPA 1', 'X-IPS 1', 'XI-IPA 1'],
                newKelasName: '',
                newSiswa: { nama: '', kelas: 'X-IPA 1' },
                
                // DATABASE (Ini yang akan di-save ke LocalStorage)
                db: {
                    sekolah: {},
                    guru: [],
                    siswa: [],
                    pengaturanGaji: { base: 250000 }
                },

                gajiCalc: { tipe: 'full', potongan: 0 },

                // LOGIC PERSISTENCE
                saveToStorage() {
                    localStorage.setItem('school_db', JSON.stringify(this.db));
                    localStorage.setItem('school_kelas', JSON.stringify(this.daftarKelas));
                },

                loadFromStorage() {
                    const savedDb = localStorage.getItem('school_db');
                    const savedKelas = localStorage.getItem('school_kelas');
                    if(savedDb) this.db = JSON.parse(savedDb);
                    if(savedKelas) this.daftarKelas = JSON.parse(savedKelas);
                },

                // ACTIONS
                login() {
                    if(this.loginUser === 'admin' && this.loginPass === 'admin') {
                        this.isLoggedIn = true;
                    } else { alert('Gagal!'); }
                },

                logout() { this.isLoggedIn = false; },

                addKelas() {
                    if(this.newKelasName) {
                        this.daftarKelas.push(this.newKelasName);
                        this.newKelasName = '';
                        this.saveToStorage();
                    }
                },

                addSiswa() {
                    if(this.newSiswa.nama) {
                        this.db.siswa.push({...this.newSiswa});
                        this.newSiswa.nama = '';
                        this.saveToStorage();
                    }
                },

                hitungGaji() {
                    let rate = { full: 1, pengganti: 0.8, selingan: 0.5 };
                    return (this.db.pengaturanGaji.base * rate[this.gajiCalc.tipe]) - this.gajiCalc.potongan;
                },

                formatRupiah(n) {
                    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n);
                },

                // PDF & BACKUP
                printPDF() {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFontSize(18);
                    doc.text("LAPORAN ADMINISTRASI SEKOLAH", 10, 20);
                    doc.setFontSize(12);
                    doc.text(`Kategori: ${this.menu.toUpperCase()}`, 10, 30);
                    doc.text(`Waktu Cetak: ${new Date().toLocaleString()}`, 10, 40);
                    doc.save(`laporan-${this.menu}.pdf`);
                },

                backupData() {
                    const dataStr = JSON.stringify({db: this.db, kelas: this.daftarKelas});
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const link = document.createElement('a');
                    link.setAttribute('href', dataUri);
                    link.setAttribute('download', `backup_sekolah_${new Date().getTime()}.json`);
                    link.click();
                },

                restoreData(event) {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const imported = JSON.parse(e.target.result);
                        this.db = imported.db;
                        this.daftarKelas = imported.kelas;
                        this.saveToStorage();
                        alert('Data Berhasil Di-restore!');
                    };
                    reader.readAsText(file);
                }
            }
        }
    </script>
</body>
</html>
