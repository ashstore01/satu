<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Administrasi Sekolah - Pro v2</title>
  
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', Roboto, sans-serif; }
    .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: all 0.2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; color: white; z-index: 9999; animation: slideIn 0.3s ease-out; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>

<body class="h-full w-full bg-slate-50">
  <div id="app" class="h-full w-full"></div>

  <script>
    // --- STATE MANAGEMENT & LOCAL STORAGE ---
    let allData = JSON.parse(localStorage.getItem('school_data')) || [];
    let currentUser = JSON.parse(localStorage.getItem('current_session')) || null;
    let currentView = currentUser ? 'dashboard' : 'login';
    let currentTab = 'beranda';
    let sidebarOpen = true;
    let editingItem = null;

    // Sinkronisasi ke LocalStorage setiap kali data berubah
    function syncStorage() {
      localStorage.setItem('school_data', JSON.stringify(allData));
      if (currentUser) localStorage.setItem('current_session', JSON.stringify(currentUser));
      else localStorage.removeItem('current_session');
    }

    const dataHandler = {
      onDataChanged(data) {
        if (data && data.length > 0) {
          allData = data;
          syncStorage();
        }
        renderApp();
      }
    };

    // --- UTILITIES ---
    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function generateId() { return Math.random().toString(36).substr(2, 9); }

    // --- AUTHENTICATION LOGIC ---
    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const username = form.username.value.trim();
      
      if (allData.find(d => d.type === 'user' && d.username === username)) {
        return showToast('Username sudah digunakan!', 'error');
      }

      const newUser = {
        id: generateId(),
        type: 'user',
        username,
        email: form.email.value,
        password: form.password.value, // Simple storage for demo
        role: form.role.value,
        created_at: new Date().toISOString()
      };

      allData.push(newUser);
      syncStorage();
      
      // Kirim ke SDK jika tersedia
      if (window.dataSdk) await window.dataSdk.create(newUser);

      showToast('Akun berhasil dibuat! Silakan login.');
      currentView = 'login';
      renderApp();
    }

    function handleLogin(e) {
      e.preventDefault();
      const { username, password } = e.target;
      
      const user = allData.find(d => 
        d.type === 'user' && 
        d.username === username.value && 
        d.password === password.value
      );

      if (user) {
        currentUser = user;
        currentView = 'dashboard';
        syncStorage();
        showToast(`Selamat datang kembali, ${user.username}`);
        renderApp();
      } else {
        showToast('Username atau password salah!', 'error');
      }
    }

    function handleLogout() {
      currentUser = null;
      currentView = 'login';
      localStorage.removeItem('current_session');
      showToast('Berhasil keluar sistem');
      renderApp();
    }

    // --- DATA CRUD ---
    async function saveForm(e, type, fields) {
      e.preventDefault();
      const form = e.target;
      const formData = { type };
      
      fields.forEach(f => formData[f] = form[f].value);

      if (editingItem) {
        const index = allData.findIndex(d => d.id === editingItem.id);
        allData[index] = { ...editingItem, ...formData };
        if (window.dataSdk) await window.dataSdk.update(allData[index]);
        showToast('Data diperbarui');
      } else {
        formData.id = generateId();
        allData.push(formData);
        if (window.dataSdk) await window.dataSdk.create(formData);
        showToast('Data ditambahkan');
      }

      editingItem = null;
      syncStorage();
      renderApp();
    }

    async function deleteItem(item) {
      if (confirm('Hapus data ini secara permanen?')) {
        allData = allData.filter(d => d.id !== item.id);
        if (window.dataSdk) await window.dataSdk.delete(item);
        syncStorage();
        showToast('Data berhasil dihapus');
        renderApp();
      }
    }

    // --- PDF EXPORT ---
    function exportToPDF(type, title, headers, keys) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const data = allData.filter(d => d.type === type);
      const rows = data.map(item => keys.map(k => item[k] || '-'));

      doc.setFontSize(18);
      doc.text(title, 14, 20);
      doc.setFontSize(10);
      doc.text(`Dicetak pada: ${new Date().toLocaleString()}`, 14, 28);
      
      doc.autoTable({
        head: [headers],
        body: rows,
        startY: 35,
        theme: 'grid',
        headStyles: { fillStyle: [79, 70, 229] }
      });
      doc.save(`Laporan_${type}_${Date.now()}.pdf`);
    }

    // --- UI RENDERING ---
    function renderApp() {
      const app = document.getElementById('app');
      if (currentView === 'login') return renderLogin(app);
      if (currentView === 'register') return renderRegister(app);
      renderDashboard(app);
    }

    function renderLogin(container) {
      container.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-indigo-900 p-6">
          <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md transform transition-all hover:scale-[1.01]">
            <div class="text-center mb-8">
              <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🏫</div>
              <h2 class="text-3xl font-extrabold text-slate-800">Admin Login</h2>
              <p class="text-slate-500 mt-2">Silakan masuk untuk mengelola data</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-5">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input name="username" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input name="password" type="password" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
              </div>
              <button class="w-full p-4 btn-primary text-white rounded-xl font-bold text-lg shadow-lg">Login</button>
            </form>
            <div class="mt-8 text-center border-t pt-6">
              <p class="text-slate-600">Belum punya akun? <a href="#" onclick="currentView='register';renderApp()" class="text-indigo-600 font-bold hover:underline">Daftar sekarang</a></p>
            </div>
          </div>
        </div>`;
    }

    function renderRegister(container) {
      container.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-indigo-900 p-6">
          <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-extrabold text-center text-slate-800 mb-2">Buat Akun</h2>
            <p class="text-center text-slate-500 mb-8">Daftar sebagai staf administrasi</p>
            <form onsubmit="handleRegister(event)" class="space-y-4">
              <input name="email" type="email" placeholder="Email Address" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
              <input name="username" placeholder="Username" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
              <input name="password" type="password" placeholder="Password" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
              <select name="role" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                <option value="admin">Admin Utama</option>
                <option value="staf">Staf TU</option>
              </select>
              <button class="w-full p-4 btn-primary text-white rounded-xl font-bold shadow-lg mt-4">Registrasi Akun</button>
            </form>
            <button onclick="currentView='login';renderApp()" class="w-full mt-4 text-slate-500 font-medium hover:text-indigo-600">Kembali ke Login</button>
          </div>
        </div>`;
    }

    function renderDashboard(container) {
      container.innerHTML = `
        <div class="flex h-screen overflow-hidden">
          <aside class="${sidebarOpen ? 'w-72' : 'w-24'} bg-slate-900 text-white sidebar-transition flex flex-col p-4 shadow-2xl z-20">
            <div class="mb-10 flex items-center px-4">
              <span class="text-2xl mr-3">🎓</span>
              <h1 class="${sidebarOpen ? 'block' : 'hidden'} font-black text-xl tracking-tight">SCHOOL-SYS</h1>
            </div>
            <nav class="flex-1 space-y-2">
              ${renderNavItem('beranda', '🏠', 'Dashboard')}
              ${renderNavItem('guru', '👨‍🏫', 'Data Guru')}
              ${renderNavItem('siswa', '👨‍🎓', 'Data Siswa')}
              ${renderNavItem('gaji', '💰', 'Manajemen Gaji')}
            </nav>
            <div class="border-t border-slate-700 pt-4 mt-auto">
              <button onclick="handleLogout()" class="w-full flex items-center p-4 rounded-2xl bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white transition-all">
                <span class="text-xl">🚪</span>
                <span class="${sidebarOpen ? 'ml-4 font-bold' : 'hidden'}">Logout</span>
              </button>
            </div>
          </aside>

          <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8">
              <button onclick="sidebarOpen=!sidebarOpen;renderApp()" class="p-2 bg-slate-100 rounded-lg hover:bg-indigo-100 text-slate-600 transition-all">
                ${sidebarOpen ? '◀' : '▶'}
              </button>
              <div class="flex items-center gap-4">
                <div class="text-right">
                  <p class="font-bold text-slate-800">${currentUser.username}</p>
                  <p class="text-xs text-indigo-500 font-bold uppercase tracking-widest">${currentUser.role}</p>
                </div>
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">${currentUser.username[0].toUpperCase()}</div>
              </div>
            </header>
            <main class="flex-1 overflow-auto p-8 bg-slate-50">
              ${renderTabContent()}
            </main>
          </div>
        </div>`;
    }

    function renderNavItem(id, icon, label) {
      const active = currentTab === id ? 'bg-indigo-600 shadow-indigo-500/50 shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white';
      return `<button onclick="currentTab='${id}';renderApp()" class="w-full flex items-center p-4 rounded-2xl ${active} transition-all duration-300">
        <span class="text-xl">${icon}</span>
        <span class="${sidebarOpen ? 'ml-4 font-bold' : 'hidden'}">${label}</span>
      </button>`;
    }

    function renderTabContent() {
      if (currentTab === 'beranda') {
        const stats = {
          guru: allData.filter(d => d.type === 'guru').length,
          siswa: allData.filter(d => d.type === 'siswa').length,
          total_gaji: allData.filter(d => d.type === 'gaji').reduce((sum, item) => sum + (parseFloat(item.gaji_harian) * parseInt(item.hari_hadir)), 0)
        };
        return `
          <h2 class="text-2xl font-black text-slate-800 mb-8">Ringkasan Statistik</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden group">
              <div class="absolute right-0 top-0 p-4 opacity-10 text-6xl group-hover:scale-110 transition-transform">👨‍🏫</div>
              <p class="text-slate-500 font-bold text-sm uppercase">Total Guru</p>
              <p class="text-4xl font-black text-slate-800 mt-2">${stats.guru}</p>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden group">
              <div class="absolute right-0 top-0 p-4 opacity-10 text-6xl group-hover:scale-110 transition-transform">👨‍🎓</div>
              <p class="text-slate-500 font-bold text-sm uppercase">Total Siswa</p>
              <p class="text-4xl font-black text-slate-800 mt-2">${stats.siswa}</p>
            </div>
            <div class="bg-indigo-600 p-8 rounded-3xl shadow-indigo-200 shadow-2xl text-white relative overflow-hidden group">
              <div class="absolute right-0 top-0 p-4 opacity-20 text-6xl group-hover:scale-110 transition-transform">💰</div>
              <p class="text-indigo-100 font-bold text-sm uppercase">Pengeluaran Gaji</p>
              <p class="text-3xl font-black mt-2">Rp ${stats.total_gaji.toLocaleString('id-ID')}</p>
            </div>
          </div>`;
      }

      // Modul dinamis untuk Guru, Siswa, Gaji
      const config = {
        guru: { title: 'Daftar Guru Pengajar', fields: ['nama','email','mapel'], headers: ['Nama','Email','Mata Pelajaran'], keys: ['nama','email','mapel'] },
        siswa: { title: 'Data Induk Siswa', fields: ['nama','nis','kelas'], headers: ['Nama Siswa','NIS','Kelas'], keys: ['nama','nis','kelas'] },
        gaji: { title: 'Pembayaran Gaji', fields: ['nama_guru','bulan','gaji_harian','hari_hadir'], headers: ['Nama Guru','Bulan','Gaji/Hari','Hadir'], keys: ['nama_guru','bulan','gaji_harian','hari_hadir'] }
      };

      const c = config[currentTab];
      return renderModule(c.title, currentTab, c.fields, c.headers, c.keys);
    }

    function renderModule(title, type, fields, headers, keys) {
      const data = allData.filter(d => d.type === type);
      return `
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
          <h2 class="text-2xl font-black text-slate-800">${title}</h2>
          <button onclick="exportToPDF('${type}', '${title}', ${JSON.stringify(headers)}, ${JSON.stringify(keys)})" class="bg-white text-rose-500 border border-rose-200 px-6 py-3 rounded-2xl font-bold hover:bg-rose-50 transition-all flex items-center shadow-sm">
            <span class="mr-2">📄</span> Export Laporan PDF
          </button>
        </div>
        
        <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8">
          <h3 class="font-bold text-slate-800 mb-6 flex items-center">
            <span class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center mr-3">＋</span>
            ${editingItem ? 'Perbarui Data' : 'Tambah Data Baru'}
          </h3>
          <form onsubmit="saveForm(event, '${type}', ${JSON.stringify(fields)})" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            ${fields.map(f => `
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">${f.replace('_', ' ')}</label>
                <input name="${f}" value="${editingItem && editingItem[f] ? editingItem[f] : ''}" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
              </div>`).join('')}
            <div class="lg:col-span-1 flex items-end">
              <button class="w-full py-3 btn-primary text-white rounded-xl font-bold">${editingItem ? 'Update' : 'Simpan Data'}</button>
            </div>
          </form>
          ${editingItem ? `<button onclick="editingItem=null;renderApp()" class="mt-4 text-slate-400 text-sm font-bold hover:text-slate-600">✕ Batalkan Pengeditan</button>` : ''}
        </div>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
          <table class="w-full">
            <thead class="bg-slate-50 border-b">
              <tr>
                ${headers.map(h => `<th class="p-5 text-left text-xs font-black text-slate-500 uppercase tracking-wider">${h}</th>`).join('')}
                <th class="p-5 text-center text-xs font-black text-slate-500 uppercase tracking-wider">Kontrol</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
              ${data.map(item => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                  ${keys.map(k => `<td class="p-5 text-slate-700 font-medium">${item[k] || '-'}</td>`).join('')}
                  <td class="p-5 text-center space-x-4">
                    <button onclick='editingItem=${JSON.stringify(item)};renderApp()' class="text-indigo-600 font-bold text-sm hover:underline">Edit</button>
                    <button onclick='deleteItem(${JSON.stringify(item)})' class="text-rose-500 font-bold text-sm hover:underline">Hapus</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
          ${data.length === 0 ? '<div class="p-20 text-center"><p class="text-slate-400 font-medium italic underline decoration-indigo-200">Belum ada rekaman data.</p></div>' : ''}
        </div>`;
    }

    // --- INITIALIZATION ---
    async function init() {
      if (window.dataSdk) {
        window.dataSdk.onChangeListener(dataHandler.onDataChanged);
        const remoteData = await window.dataSdk.read();
        if (remoteData) {
            allData = remoteData;
            syncStorage();
        }
      }
      renderApp();
    }

    init();
  </script>
</body>
</html>
