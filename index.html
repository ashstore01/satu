<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Administrasi Sekolah - Pro</title>
  
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .sidebar-transition { transition: all 0.3s ease; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; color: white; z-index: 9999; animation: slideIn 0.3s ease-out; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal-backdrop { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
  </style>
</head>

<body class="h-full w-full bg-gray-50">
  <div id="app" class="h-full w-full"></div>

  <script>
    // --- STATE MANAGEMENT ---
    let allData = [];
    let currentUser = null;
    let currentView = 'login'; // login, register, dashboard
    let currentTab = 'beranda';
    let sidebarOpen = true;
    let editingItem = null;

    const dataHandler = {
      onDataChanged(data) {
        allData = data || [];
        renderApp();
      }
    };

    // --- UTILITIES ---
    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

    // --- LOGIC FUNCTIONS ---
    async function handleRegister(e) {
      e.preventDefault();
      const form = e.target;
      const username = form.username.value.trim();
      
      if (allData.find(d => d.type === 'user' && d.username === username)) {
        return showToast('Username sudah terdaftar', 'error');
      }

      const res = await window.dataSdk.create({
        id: generateId(),
        type: 'user',
        email: form.email.value,
        username,
        password: form.password.value,
        role: form.role.value,
        created_at: new Date().toISOString()
      });

      if (res.isOk) {
        showToast('Registrasi Berhasil!');
        currentView = 'login';
        renderApp();
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = allData.find(d => d.type === 'user' && d.username === e.target.username.value && d.password === e.target.password.value);
      if (user) {
        currentUser = user;
        currentView = 'dashboard';
        showToast(`Selamat datang, ${user.username}`);
        renderApp();
      } else {
        showToast('Login Gagal!', 'error');
      }
    }

    async function saveForm(e, type, fields) {
      e.preventDefault();
      const form = e.target;
      const formData = { type, id: editingItem ? editingItem.id : generateId() };
      fields.forEach(f => formData[f] = form[f].value);

      const res = editingItem ? await window.dataSdk.update({ ...editingItem, ...formData }) : await window.dataSdk.create(formData);
      
      if (res.isOk) {
        showToast('Data berhasil disimpan');
        editingItem = null;
        form.reset();
        renderApp();
      }
    }

    // --- EXPORT PDF ---
    function exportToPDF(type, title, headers, dataKeys) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const filteredData = allData.filter(d => d.type === type);
      const rows = filteredData.map(item => dataKeys.map(key => item[key] || '-'));

      doc.text(title, 14, 15);
      doc.autoTable({ head: [headers], body: rows, startY: 20 });
      doc.save(`${title}.pdf`);
    }

    // --- VIEWS RENDERING ---
    function renderApp() {
      const app = document.getElementById('app');
      if (currentView === 'login') return renderLogin(app);
      if (currentView === 'register') return renderRegister(app);
      renderDashboard(app);
    }

    function renderLogin(container) {
      container.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-slate-900 p-4">
          <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6">Masuk ke Sistem</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
              <input name="username" placeholder="Username" required class="w-full p-3 border rounded-lg">
              <input name="password" type="password" placeholder="Password" required class="w-full p-3 border rounded-lg">
              <button class="w-full p-3 btn-primary text-white rounded-lg font-bold">Login</button>
            </form>
            <p class="mt-4 text-center text-sm">Belum punya akun? <a href="#" onclick="currentView='register';renderApp()" class="text-indigo-600 font-bold">Daftar</a></p>
          </div>
        </div>`;
    }

    function renderRegister(container) {
      container.innerHTML = `
        <div class="min-h-screen flex items-center justify-center bg-slate-900 p-4">
          <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-center mb-6">Registrasi Akun</h2>
            <form onsubmit="handleRegister(event)" class="space-y-4">
              <input name="email" type="email" placeholder="Email" required class="w-full p-3 border rounded-lg">
              <input name="username" placeholder="Username" required class="w-full p-3 border rounded-lg">
              <input name="password" type="password" placeholder="Password" required class="w-full p-3 border rounded-lg">
              <select name="role" class="w-full p-3 border rounded-lg">
                <option value="admin">Admin</option>
                <option value="guru">Guru</option>
              </select>
              <button class="w-full p-3 btn-primary text-white rounded-lg font-bold">Daftar</button>
            </form>
            <p class="mt-4 text-center text-sm"><a href="#" onclick="currentView='login';renderApp()" class="text-indigo-600 font-bold">Kembali ke Login</a></p>
          </div>
        </div>`;
    }

    function renderDashboard(container) {
      container.innerHTML = `
        <div class="flex h-screen overflow-hidden">
          <aside class="${sidebarOpen ? 'w-64' : 'w-20'} bg-slate-800 text-white sidebar-transition flex flex-col">
            <div class="p-4 text-center font-bold border-b border-slate-700 truncate">
              ${sidebarOpen ? 'Sistem Sekolah' : '🏫'}
            </div>
            <nav class="flex-1 p-2 space-y-1">
              ${renderNavBtn('beranda', '🏠', 'Dashboard')}
              ${renderNavBtn('guru', '👨‍🏫', 'Data Guru')}
              ${renderNavBtn('siswa', '👨‍🎓', 'Data Siswa')}
              ${renderNavBtn('gaji', '💰', 'Gaji Guru')}
            </nav>
            <button onclick="currentUser=null;currentView='login';renderApp()" class="p-4 bg-red-600 hover:bg-red-700 text-sm font-bold">Logout</button>
          </aside>

          <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white shadow flex items-center justify-between px-6">
              <button onclick="sidebarOpen=!sidebarOpen;renderApp()" class="text-xl">☰</button>
              <span class="font-semibold text-gray-700">Halo, ${currentUser.username} (${currentUser.role})</span>
            </header>
            <main class="flex-1 overflow-auto p-6 bg-gray-100">
              ${renderTabContent()}
            </main>
          </div>
        </div>`;
    }

    function renderNavBtn(id, icon, label) {
      const active = currentTab === id ? 'bg-indigo-600' : 'hover:bg-slate-700';
      return `<button onclick="currentTab='${id}';renderApp()" class="w-full flex items-center p-3 rounded-lg ${active} transition-colors">
        <span class="mr-3">${icon}</span> ${sidebarOpen ? label : ''}
      </button>`;
    }

    function renderTabContent() {
      if (currentTab === 'beranda') {
        const counts = {
          guru: allData.filter(d => d.type === 'guru').length,
          siswa: allData.filter(d => d.type === 'siswa').length,
          gaji: allData.filter(d => d.type === 'gaji').length
        };
        return `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-blue-500">
              <h3 class="text-gray-500 text-sm font-bold uppercase">Total Guru</h3>
              <p class="text-3xl font-bold">${counts.guru}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow border-l-4 border-green-500">
              <h3 class="text-gray-500 text-sm font-bold uppercase">Total Siswa</h3>
              <p class="text-3xl font-bold">${counts.siswa}</p>
            </div>
             <div class="bg-white p-6 rounded-xl shadow border-l-4 border-purple-500">
              <h3 class="text-gray-500 text-sm font-bold uppercase">Data Gaji</h3>
              <p class="text-3xl font-bold">${counts.gaji}</p>
            </div>
          </div>
          <div class="mt-10 bg-white p-8 rounded-2xl shadow-sm text-center">
             <h2 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang di Sistem Administrasi</h2>
             <p class="text-gray-500">Gunakan menu di samping untuk mengelola data sekolah secara efisien.</p>
          </div>
        `;
      }

      if (currentTab === 'guru') {
        return renderModule('Data Guru', 'guru', 
          ['nama_guru', 'email', 'telepon', 'mata_pelajaran'], 
          ['Nama', 'Email', 'No. Telp', 'Mapel'],
          ['nama_guru', 'email', 'telepon', 'mata_pelajaran']
        );
      }

      if (currentTab === 'siswa') {
        return renderModule('Data Siswa', 'siswa', 
          ['nama_siswa', 'nis', 'kelas', 'alamat'], 
          ['Nama Siswa', 'NIS', 'Kelas', 'Alamat'],
          ['nama_siswa', 'nis', 'kelas', 'alamat']
        );
      }

      if (currentTab === 'gaji') {
        return renderModule('Data Gaji Guru', 'gaji', 
          ['nama_guru', 'bulan', 'tahun', 'gaji_harian', 'hari_hadir'], 
          ['Nama Guru', 'Bulan', 'Tahun', 'Gaji/Hari', 'Hadir'],
          ['nama_guru', 'bulan', 'tahun', 'gaji_harian', 'hari_hadir']
        );
      }
    }

    function renderModule(title, type, fields, headers, keys) {
      const data = allData.filter(d => d.type === type);
      return `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-800">${title}</h2>
          <button onclick="exportToPDF('${type}', '${title}', ${JSON.stringify(headers)}, ${JSON.stringify(keys)})" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-700">Export PDF</button>
        </div>
        
        <div class="bg-white p-6 rounded-xl shadow mb-8">
          <h3 class="font-bold mb-4">${editingItem ? 'Edit' : 'Tambah'} Data</h3>
          <form onsubmit="saveForm(event, '${type}', ${JSON.stringify(fields)})" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${fields.map(f => `<input name="${f}" value="${editingItem && editingItem[f] ? editingItem[f] : ''}" placeholder="${f.replace('_', ' ').toUpperCase()}" required class="p-2 border rounded">`).join('')}
            <div class="flex gap-2">
              <button class="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700">${editingItem ? 'Update' : 'Simpan'}</button>
              ${editingItem ? `<button type="button" onclick="editingItem=null;renderApp()" class="bg-gray-500 text-white px-4 py-2 rounded">Batal</button>` : ''}
            </div>
          </form>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-gray-50 border-b">
              <tr>
                ${headers.map(h => `<th class="p-4 font-bold text-gray-600">${h}</th>`).join('')}
                <th class="p-4 font-bold text-gray-600 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(item => `
                <tr class="border-b hover:bg-gray-50">
                  ${keys.map(k => `<td class="p-4 text-gray-700">${item[k] || '-'}</td>`).join('')}
                  <td class="p-4 flex justify-center gap-2">
                    <button onclick='editingItem=${JSON.stringify(item)};renderApp()' class="text-blue-600 hover:underline font-bold">Edit</button>
                    <button onclick='deleteItemData(${JSON.stringify(item)})' class="text-red-600 hover:underline font-bold">Hapus</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${data.length === 0 ? '<p class="p-10 text-center text-gray-400">Tidak ada data ditemukan.</p>' : ''}
        </div>`;
    }

    async function deleteItemData(item) {
      if (confirm('Yakin ingin menghapus data ini?')) {
        const res = await window.dataSdk.delete(item);
        if (res.isOk) showToast('Data berhasil dihapus');
      }
    }

    // --- INITIALIZE ---
    async function initApp() {
      if (window.dataSdk) {
        window.dataSdk.onChangeListener(dataHandler.onDataChanged);
        const data = await window.dataSdk.read();
        allData = data || [];
      }
      renderApp();
    }

    initApp();
  </script>
</body>
</html>
